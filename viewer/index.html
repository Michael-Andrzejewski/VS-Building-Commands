<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Building Commands viewer</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0a1a26; color: #cde; font-family: system-ui, sans-serif; overflow: hidden; }
    #ui { position: fixed; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.55); padding: 10px 12px; border-radius: 8px; }
    select { font-size: 14px; padding: 4px 6px; background: #12303f; color: #cde; border: 1px solid #2a5568; border-radius: 4px; }
    #info { margin-top: 8px; font-size: 12px; opacity: 0.85; line-height: 1.5; }
    #hint { position: fixed; bottom: 10px; left: 12px; font-size: 12px; opacity: 0.55; z-index: 10; }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="ui">
    <select id="sel"></select>
    <div id="info">loading...</div>
  </div>
  <div id="hint">drag to orbit &middot; scroll to zoom</div>
  <script src="/viewer/three.min.js"></script>
  <script src="/viewer/app.js"></script>
</body>
</html>
